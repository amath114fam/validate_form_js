<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div id="contenu" class="container w-50 m-auto">
        <form id="onboardingForm" class="bg-light p-4">

            <h2 class="mb-4">Mieux se connaître</h2>

            <!-- Nom complet -->
            <div class="mb-3">
                <label for="fullname" class="form-label">
                    Prénom & Nom
                </label>

                <input
                    type="text"
                    id="fullname"
                    class="form-control"
                    placeholder="Entrez votre prénom et nom"
                >

                <small id="fullnameError" class="text-danger"></small>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">
                    Adresse email
                </label>

                <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="exemple@mail.com"
                >

                <small id="emailError" class="text-danger"></small>
            </div>

            <!-- Domaine -->
            <div class="mb-3">
                <label for="domain" class="form-label">
                    Quel est ton domaine de prédilection actuel ?
                </label>

                <select id="domain" class="form-select">
                    <option value="">
                        Sélectionne ton domaine...
                    </option>

                    <option value="frontend">
                        Front-End
                    </option>

                    <option value="backend">
                        Back-End
                    </option>

                    <option value="design">
                        Design / UX
                    </option>

                    <option value="data">
                        Data
                    </option>
                </select>

                <small id="domainError" class="text-danger"></small>
            </div>

            <!-- Radio Buttons -->
            <div class="mb-4">
                <label class="form-label d-block">
                    Tu es plutôt...
                </label>

                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="chronotype"
                        id="morning"
                        value="morning"
                    >

                    <label class="form-check-label" for="morning">
                        Early Bird (Matin)
                    </label>
                </div>

                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="chronotype"
                        id="night"
                        value="night"
                    >

                    <label class="form-check-label" for="night">
                        Night Owl (Soir)
                    </label>
                </div>

                <small id="radioError"  class="text-danger"></small>
            </div>

            <!-- Centres d'intérêt -->
            <div class="mb-4">

                <label class="form-label d-block">
                    Quelles sont tes passions ?
                </label>

                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        value="Veille Tech"
                        id="tech"
                    >

                    <label class="form-check-label" for="tech">
                        Veille Tech
                    </label>
                </div>

                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        value="Gaming"
                        id="gaming"
                    >

                    <label class="form-check-label" for="gaming">
                        Gaming
                    </label>
                </div>

                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        value="Sport"
                        id="sport"
                    >

                    <label class="form-check-label" for="sport">
                        Sport
                    </label>
                </div>

                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        value="Musique"
                        id="music"
                    >

                    <label class="form-check-label" for="music">
                        Musique
                    </label>
                </div>

                <div class="form-check">
                    <input
                        class="form-check-input"
                        type="checkbox"
                        value="Lecture"
                        id="reading"
                    >

                    <label class="form-check-label" for="reading">
                        Lecture
                    </label>
                </div>

                <small id="checkboxError" class="text-danger"></small>
            </div>

            <!-- Présentation -->
            <div class="mb-4">
                <label for="story" class="form-label">
                    Raconte-nous une anecdote drôle ou ton ambition ultime dans la tech
                </label>

                <textarea
                    id="story"
                    rows="5"
                    maxlength="255"
                    class="form-control"
                    placeholder="Minimum 25 caractères..."
                ></textarea>

                <div class="d-flex justify-content-between mt-1">
                    <small id="storyError" class="text-danger"></small>
                    <small id="counter" class="text-muted">
                        255 caractères restants
                    </small>
                </div>
            </div>

            <!-- Bouton -->
            <button
                type="submit"
                class="btn btn-primary w-100"
            >
                Envoyer
            </button>

        </form>

    </div>

    <div id="userCardContainer" class=" container mt-5 row"></div>
    
    <div id="success-message">
        <span id="success-icon">✔</span>
        Formulaire envoyé avec succès !
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
